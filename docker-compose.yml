version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gestion-pagos-db
    environment:
      POSTGRES_DB: gestion_pagos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: gestion-pagos-app
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/gestion_pagos
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: ClaretianPay2024SecretKeyForJWTTokenGenerationMustBe256BitsLong
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
