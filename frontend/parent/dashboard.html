<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Principal | ClaretianPay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- ✅ CORREGIDO: la ruta correcta del CSS -->
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        /* Botón de cerrar sesión en el sidebar */
        .logout-btn {
            margin-top: auto;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white !important;
        }

        .logout-btn:hover {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
        }

        .logout-btn i {
            color: white !important;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h2>ClaretianPay</h2>
            </div>

            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <i class="fas fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="estudiantes">
                    <i class="fas fa-users"></i>
                    <span>Mis Hijos</span>
                </a>
                <a href="#" class="nav-item" data-page="deudas">
                    <i class="fas fa-file-invoice"></i>
                    <span>Deudas</span>
                </a>
                <a href="#" class="nav-item" data-page="pagos">
                    <i class="fas fa-credit-card"></i>
                    <span>Pagar</span>
                </a>
                <a href="#" class="nav-item" data-page="reportes">
                    <i class="fas fa-chart-line"></i>
                    <span>Reportes</span>
                </a>
                <a href="#" class="nav-item" data-page="notificaciones">
                    <i class="fas fa-bell"></i>
                    <span>Notificaciones</span>
                </a>
                <a href="#" class="nav-item logout-btn" onclick="cerrarSesion()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Cerrar Sesión</span>
                </a>
            </nav>

            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <div>
                    <p id="userName"></p>
                    <small>Padre de familia</small>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="page-title-section">
                    <h1 id="pageTitle">Panel de Control</h1>
                    <p id="pageSubtitle">Bienvenido de vuelta</p>
                </div>
                <div class="header-actions">
                    <div class="notification-bell" onclick="cargarNotificaciones()">
                        <i class="fas fa-bell"></i>
                        <span id="notifCount" class="notification-badge" style="display: none;">0</span>
                    </div>
                    <button class="refresh-btn" onclick="window.cargarDatosIniciales()">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </header>

            <div id="content-area" class="content-area">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <p>Cargando tu información...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de Pago - VERSIÓN CORRECTA -->
    <div id="modalPago" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-credit-card"></i> Realizar Pago</h2>
                <span class="close-modal" onclick="cerrarModales()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="formPago">
                    <input type="hidden" id="deudaId">
                    <input type="hidden" id="montoTotal">

                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> Concepto</label>
                        <input type="text" id="conceptoNombre" readonly style="background: #f3f4f6;">
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-user-graduate"></i> Estudiante</label>
                        <input type="text" id="estudianteNombre" readonly style="background: #f3f4f6;">
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-dollar-sign"></i> Monto a pagar</label>
                        <input type="text" id="montoMostrar" readonly
                            style="background: #f3f4f6; font-size: 24px; font-weight: bold; color: #10b981;">
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-wallet"></i> Método de Pago</label>
                        <select id="metodoPago" required>
                            <option value="EFECTIVO">💰 Efectivo</option>
                            <option value="TRANSFERENCIA">🏦 Transferencia Bancaria</option>
                            <option value="TARJETA">💳 Tarjeta de Crédito/Débito</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-primary" style="width: 100%;">
                        <i class="fas fa-check-circle"></i> Confirmar Pago
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div id="modalRecibo" class="modal">
        <div class="modal-content" style="max-width: 450px;">
            <div class="modal-header">
                <h2>Comprobante de Pago</h2>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body">
                <div id="reciboContent"></div>
            </div>
        </div>
    </div>

    <!-- ✅ SCRIPTS CORREGIDOS (sin duplicados) -->
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        // Configurar nombre de usuario
        document.addEventListener('DOMContentLoaded', () => {
            const session = obtenerSesion();
            if (session) {
                document.getElementById('userName').textContent = session.nombre;
            } else {
                console.log('No hay sesión');
                window.location.href = '/login.html';
            }
        });
    </script>
    <script src="/js/parent/estudiantes.js"></script>
    <script src="/js/parent/deudas.js"></script>
    <script src="/js/parent/pagos.js"></script>
    <script src="/js/parent/notificaciones.js"></script>
    <script src="/js/parent/main.js"></script>
</body>

</html>
